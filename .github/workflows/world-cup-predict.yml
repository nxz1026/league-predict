name: World Cup Predict

on:
  schedule:
    - cron: '35 8 * * *'  # 16:35 BJT (08:35 UTC)，比原 cron 晚 1 小时避免高峰
  workflow_dispatch:  # 允许手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run prediction
        run: python scripts/predict_wc.py 2>&1 | tee /tmp/predict_output.txt

      - name: Format email
        id: format
        run: |
          python3 << 'PYEOF'
          import json, sys
          from datetime import datetime, timezone, timedelta

          # Read prediction JSON from stdout (last line is JSON)
          output = open('/tmp/predict_output.txt').read()
          # Find the JSON part (starts with {)
          json_start = output.find('{\n')
          if json_start == -1:
              print("No JSON found")
              sys.exit(1)
          
          data = json.loads(output[json_start:])
          
          # Format email body
          bjt = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')
          lines = []
          lines.append(f"⚽ 世界杯预测 | {bjt}")
          lines.append("=" * 30)
          lines.append("")
          
          # Calibration
          cal = data.get('calibration', {})
          if cal.get('total_matches', 0) > 0:
              lines.append(f"📊 校准：{cal['total_matches']}场 | 主胜 {cal.get('home_win_rate',0)*100:.0f}% 平 {cal.get('draw_rate',0)*100:.0f}% 客胜 {cal.get('away_win_rate',0)*100:.0f}%")
              if cal.get('odds_accuracy', 0) > 0:
                  lines.append(f"   热门正确率：{cal['odds_accuracy']*100:.0f}%")
              lines.append("")
          
          # Predictions
          preds = data.get('predictions', [])
          if not preds:
              lines.append("📌 未来 24h 无待预测比赛")
          else:
              lines.append(f"🔥 待预测：{len(preds)} 场")
              lines.append("")
              for p in preds:
                  poisson_str = " / ".join(f"{t['score']}({t['prob']:.0%})" for t in p.get('poisson_top3', [])[:3])
                  lines.append(f"🏟 {p['match']}")
                  lines.append(f"   方向：{p['direction']} {p['stars']}")
                  lines.append(f"   比分：{poisson_str}")
                  lines.append(f"   λ：{p.get('lambda_home',0)}/{p.get('lambda_away',0)} | {p.get('over_under','')} | BTTS {p.get('btts','')}")
                  lines.append("")
          
          email_body = "\n".join(lines)
          with open('/tmp/email_body.txt', 'w') as f:
              f.write(email_body)
          
          # Output for GitHub Actions
          print(f"::set-output name=subject::⚽ 世界杯预测 {datetime.now(timezone(timedelta(hours=8))).strftime('%m/%d')}")
          print(email_body)
          PYEOF

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "⚽ 世界杯预测 ${{ steps.format.outputs.subject }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}
          html_body: |
            <pre style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
            ${{ steps.format.outputs.body }}
            </pre>
          convert_markdown: false
