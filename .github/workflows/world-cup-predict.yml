name: World Cup Predict

on:
  schedule:
    - cron: '35 8 * * *'  # 16:35 BJT (08:35 UTC)
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run prediction
        run: python3 scripts/predict_wc.py > /tmp/predict_output.txt 2>/tmp/predict_stderr.txt

      - name: Show stderr (debug)
        run: cat /tmp/predict_stderr.txt

      - name: Format email
        id: format
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, sys
          from datetime import datetime, timezone, timedelta

          # Read ONLY stdout (clean JSON, no log lines)
          output = open('/tmp/predict_output.txt').read().strip()
          if not output:
              print('ERROR: No JSON output')
              sys.exit(1)

          try:
              data = json.loads(output)
          except json.JSONDecodeError as e:
              print(f'JSON parse error: {e}')
              print(f'Output: {output[:500]}...')
              sys.exit(1)

          # Format email body
          bjt = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')
          lines_out = []
          lines_out.append(f"⚽ 世界杯预测 | {bjt}")
          lines_out.append("=" * 30)
          lines_out.append("")

          cal = data.get('calibration', {})
          if cal.get('total_matches', 0) > 0:
              lines_out.append(f"📊 校准：{cal['total_matches']}场 | 主胜 {cal.get('home_win_rate',0)*100:.0f}% 平 {cal.get('draw_rate',0)*100:.0f}% 客胜 {cal.get('away_win_rate',0)*100:.0f}%")
              if cal.get('odds_accuracy', 0) > 0:
                  lines_out.append(f"   热门正确率：{cal['odds_accuracy']*100:.0f}%")
              lines_out.append("")

          preds = data.get('predictions', [])
          if not preds:
              lines_out.append("📌 未来 24h 无待预测比赛")
          else:
              lines_out.append(f"🔥 待预测：{len(preds)} 场")
              lines_out.append("")
              for p in preds:
                  top3 = p.get('top3_scores', [])[:3]
                  poisson_str = " / ".join(f"{t['score']}({t['prob']*100:.0f}%)" for t in top3)
                  lines_out.append(f"🏟 {p['match']}")
                  lines_out.append(f"   方向：{p['direction']} {p['stars']}")
                  if poisson_str:
                      lines_out.append(f"   比分：{poisson_str}")
                  lines_out.append(f"   xG：{p.get('expected_goals_home',0)}/{p.get('expected_goals_away',0)} | {p.get('over_under','')} | BTTS {p.get('btts','')}")
                  lines_out.append("")

          email_body = "\n".join(lines_out)

          # Set outputs via GITHUB_OUTPUT
          github_output = '/tmp/github_output.txt'
          with open(github_output, 'w') as f:
              subject = f"⚽ 世界杯预测 {datetime.now(timezone(timedelta(hours=8))).strftime('%m/%d')}"
              f.write(f"subject={subject}\n")
              f.write(f"body<<EOF\n{email_body}\nEOF\n")

          print(email_body)
          PYEOF
          cat /tmp/github_output.txt >> "$GITHUB_OUTPUT"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "⚽ 世界杯预测 ${{ steps.format.outputs.subject }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}
          html_body: |
            <pre style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
            ${{ steps.format.outputs.body }}
            </pre>
