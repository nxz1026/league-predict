name: League Predict

on:
  schedule:
    - cron: '0 13 * * *'  # 21:00 BJT (13:00 UTC)
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Cleanup old predictions (retain 7 days)
        run: python3 scripts/predict.py --cleanup

      - name: Run prediction
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python3 scripts/predict.py > /tmp/predict_output.txt 2>/tmp/predict_stderr.txt || (cat /tmp/predict_stderr.txt && cat /tmp/predict_output.txt && exit 1)

      - name: Show stderr (debug)
        run: cat /tmp/predict_stderr.txt

      - name: Format message
        id: format
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, sys, os
          from datetime import datetime, timezone, timedelta

          output = open('/tmp/predict_output.txt').read().strip()
          if not output:
              print('ERROR: No JSON output')
              sys.exit(1)

          try:
              data = json.loads(output)
          except json.JSONDecodeError as e:
              print(f'JSON parse error: {e}')
              print(f'Output: {output[:500]}...')
              sys.exit(1)

          bjt = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')
          lines_out = []
          lines_out.append(f'[League Predict] {bjt}')
          lines_out.append('=' * 30)
          lines_out.append('')

          status = data.get('status', 'ok')
          if status == 'no_matches':
              lines_out.append('未来 24h 无比赛，跳过预测')
              lines_out.append(f'数据窗口：{data.get("data_window","")}')
          elif status == 'no_future_matches':
              cal = data.get('calibration', {})
              lines_out.append(f'校准：{cal.get("total_matches",0)}场已结束')
              lines_out.append(f'  主胜 {cal.get("home_win_rate",0)*100:.0f}%  平 {cal.get("draw_rate",0)*100:.0f}%  客胜 {cal.get("away_win_rate",0)*100:.0f}%')
              if cal.get('odds_accuracy', 0) > 0:
                  lines_out.append(f'  热门正确率：{cal["odds_accuracy"]*100:.0f}%')
              lines_out.append('')
              lines_out.append('未来 24h 内无待预测比赛')
          else:
              cal = data.get('calibration', {})
              if cal.get('total_matches', 0) > 0:
                  lines_out.append(f'校准：{cal["total_matches"]}场 | 主胜 {cal.get("home_win_rate",0)*100:.0f}%  平 {cal.get("draw_rate",0)*100:.0f}%  客胜 {cal.get("away_win_rate",0)*100:.0f}%')
                  if cal.get('odds_accuracy', 0) > 0:
                      lines_out.append(f'  热门正确率：{cal["odds_accuracy"]*100:.0f}%')
                  lines_out.append('')

              preds = data.get('predictions', [])
              if not preds:
                  lines_out.append('未来 24h 内无待预测比赛')
              else:
                  lines_out.append(f'待预测：{len(preds)} 场')
                  lines_out.append('')
                  for p in preds:
                      top3 = p.get('poisson_top3', [])[:3]
                      poisson_str = ' / '.join(f'{t["score"]}({t["prob"]*100:.0f}%)' for t in top3)
                      ci_home = p.get('lambda_home_ci95', (0, 0))
                      ci_away = p.get('lambda_away_ci95', (0, 0))
                      rf = p.get('reasoning_factors', {})
                      ps = p.get('prediction_summary', {})
                      on_home = p.get('onside_signals', {}).get('home', {}).get('onside_score')
                      on_away = p.get('onside_signals', {}).get('away', {}).get('onside_score')
                      lines_out.append(f'[预测] {p["match"]}')
                      lines_out.append(f'  方向：{p["direction"]} {p["stars"]}')
                      lines_out.append(f'  盘口：odds_data_available={p.get("odds_data_available")} | spread_home_line={p.get("spread_home_line")} | total_over_close={p.get("total_over_close")}')
                      if p.get("confidence_note"):
                          lines_out.append(f'  ？{p["confidence_note"]}')
                      if poisson_str:
                          lines_out.append(f'  比分：{poisson_str}')
                      lines_out.append(f'  xG：{p.get("lambda_home",0):.3f} [{ci_home[0]:.3f}-{ci_home[1]:.3f}] / {p.get("lambda_away",0):.3f} [{ci_away[0]:.3f}-{ci_away[1]:.3f}]')
                      lines_out.append(f'  {p.get("over_under","")} | BTTS {p.get("btts","")}')
                      if rf:
                          lines_out.append(f'  概率：主{rf.get("home_prob_weighted",0):.3f} 平{rf.get("draw_prob_weighted",0):.3f} 客{rf.get("away_prob_weighted",0):.3f} | 市场主{rf.get("home_ml_true_prob",0):.3f} 平{rf.get("draw_true_prob",0):.3f} 客{rf.get("away_ml_true_prob",0):.3f}')
                          lines_out.append(f'  状态：主形态{rf.get("home_form_score",0):.3f} 客形态{rf.get("away_form_score",0):.3f} | 主记录{rf.get("home_record_score",0):.3f} 客记录{rf.get("away_record_score",0):.3f} | spread_movement={rf.get("spread_movement",0):.3f}')
                      if on_home is not None and on_away is not None:
                          lines_out.append(f'  Onside：主{on_home:.3f} 客{on_away:.3f}')
                      sb = ps.get('signal_breakdown', {})
                      if sb:
                          lines_out.append(f'  信号：市场{sb.get("market_component",0)} | Onside{sb.get("onside_component",0)} | spread调整{sb.get("spread_adjustment",0)} | 总强度{sb.get("total_strength",0)}')
                      lines_out.append('')

          # 回填结果（过去24h已结束比赛）
          pm = data.get('past_matches', [])
          if pm:
              lines_out.append(f'回填：{len(pm)} 场')
              for m in pm:
                  display = m.get('name', f"{m.get('away','?')} vs {m.get('home','?')}")
                  sc = m.get('score', '?')
                  lines_out.append(f'  {display} -> {sc}')

          # 累积校准信息
          co = data.get('calibration_offset')
          if co:
              lines_out.append(f'')
              lines_out.append(f'累积校准(n={co["sample_size"]}): 主x{co["home_correction"]} 平x{co["draw_correction"]} 客x{co["away_correction"]}')
              lines_out.append(f'  实际分布: 主{co["actual_home_rate"]} | 平{co["actual_draw_rate"]} | 客{co["actual_away_rate"]}')

          email_body = '\n'.join(lines_out)

          with open('/tmp/email_body.txt', 'w') as f:
              f.write(email_body)

          print(email_body)

          github_output = os.environ.get('GITHUB_OUTPUT', '/tmp/github_output.txt')
          with open(github_output, 'a') as f:
              day = datetime.now(timezone(timedelta(hours=8))).strftime('%m/%d')
              f.write(f'subject={day}\n')
          PYEOF

      - name: Send webhook (with retry)
        shell: bash
        env:
          FEISHU_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, time

          body = open('/tmp/email_body.txt').read()

          payload = {
              "msg_type": "text",
              "content": {
                  "text": body
              }
          }

          url = os.environ.get('FEISHU_URL', '')
          if not url:
              print('ERROR: FEISHU_WEBHOOK_URL secret not configured')
              exit(1)
          max_retries = 3
          last_error = None

          for attempt in range(1, max_retries + 1):
              try:
                  req = urllib.request.Request(
                      url,
                      data=json.dumps(payload).encode(),
                      headers={'Content-Type': 'application/json'},
                      method='POST'
                  )
                  resp = urllib.request.urlopen(req, timeout=15)
                  result = json.loads(resp.read())
                  print(f"Webhook response (attempt {attempt}): {result}")
                  if result.get('code') == 0:
                      print("Webhook sent successfully")
                      exit(0)
                  else:
                      last_error = f"Webhook failed: {result.get('msg')}"
                      print(last_error)
              except Exception as e:
                  last_error = f"Attempt {attempt} failed: {e}"
                  print(last_error)
                  if attempt < 3:
                      time.sleep(5)
              else:
                  break
          else:
              print(f"All {3} attempts failed. Last error: {last_error}")
              exit(1)
          PYEOF
